name: Validacion Arquitectonica

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:

  arquitectura:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 21

      - name: Dar permisos Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar reglas ArchUnit
        run: ./mvnw test -Dtest=ReglasArquitectura