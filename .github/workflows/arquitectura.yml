name: Validacion Arquitectonica

on:
  push:
    branches:
      - master

jobs:

  arquitectura:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 21

      - name: Ejecutar tests
        run: mvn test